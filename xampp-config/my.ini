# XAMPP MySQL Configuration for Greggory Foundation Ltd
# This file is backed up to GitHub for disaster recovery

[client]
port=3306
socket="C:/xampp/mysql/mysql.sock"

[mysql]
default-character-set=utf8mb4

[mysqld]
port=3306
socket="C:/xampp/mysql/mysql.sock"
basedir="C:/xampp/mysql"
tmpdir="C:/xampp/mysql/tmp"
datadir="C:/xampp/mysql/data"
pid_file="mysql.pid"
key_buffer=16M
max_allowed_packet=1M
table_open_cache=64
sort_buffer_size=512K
net_buffer_length=8K
read_buffer_size=256K
read_rnd_buffer_size=512K
myisam_sort_buffer_size=8M
log_error="mysql_error.log"

# Character Set and Collation
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci
init_connect='SET NAMES utf8mb4'

# InnoDB Configuration
innodb_buffer_pool_size=16M
innodb_log_file_size=5M
innodb_flush_log_at_trx_commit=1
innodb_lock_wait_timeout=50

# Connection Settings
max_connections=100
connect_timeout=10
wait_timeout=28800
interactive_timeout=28800

# Query Cache (disabled for better performance in most cases)
query_cache_type=0
query_cache_size=0

# Binary Logging (for replication/backup)
log_bin=mysql-bin
binlog_format=ROW
expire_logs_days=7

# Slow Query Log
slow_query_log=1
slow_query_log_file="C:/xampp/mysql/data/slow-query.log"
long_query_time=2

# General Query Log (disable in production)
# general_log=1
# general_log_file="C:/xampp/mysql/data/general-query.log"

# Security
skip-name-resolve
local_infile=0

# SQL Mode
sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION

[mysqldump]
quick
max_allowed_packet=16M

[myisamchk]
key_buffer=8M
sort_buffer_size=8M

[mysqlhotcopy]
interactive-timeout
