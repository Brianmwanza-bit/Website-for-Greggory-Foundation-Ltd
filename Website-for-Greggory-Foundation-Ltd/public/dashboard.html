<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .database-card {
            transition: all 0.3s ease;
        }
        .database-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .loading {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Database Manager</h1>
            <p class="text-gray-600">Manage your MySQL databases with ease</p>
        </header>
        
        <!-- Status Bar -->
        <div id="statusBar" class="bg-white rounded-lg shadow p-4 mb-6 flex items-center">
            <div class="flex items-center">
                <div id="connectionStatus" class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></div>
                <span id="statusText" class="text-sm font-medium">Connecting to server...</span>
            </div>
        </div>
        
        <!-- Database List -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Available Databases</h2>
                <button onclick="loadDatabases()" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="databaseList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-center py-8">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2 text-gray-600">Loading databases...</p>
                </div>
            </div>
        </div>

        <!-- Table Viewer -->
        <div id="tableViewer" class="bg-white rounded-lg shadow p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-semibold text-gray-800" id="currentDatabase"></h2>
                    <p class="text-sm text-gray-500" id="tableCount"></p>
                </div>
                <button onclick="backToDatabases()" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back to Databases
                </button>
            </div>
            
            <div id="tableList" class="mb-8">
                <h3 class="text-lg font-medium mb-3 text-gray-800">Tables</h3>
                <div class="flex flex-wrap gap-2" id="tableButtons">
                    <div class="animate-pulse flex space-x-4 w-full">
                        <div class="flex-1 space-y-4 py-1">
                            <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="tableData" class="overflow-x-auto">
                <div class="text-center py-12 text-gray-500">
                    <p>Select a table to view its data</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDb = '';

        // Load databases when page loads
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('Connecting to server...', 'yellow');
            checkServerConnection()
                .then(() => loadDatabases())
                .catch(error => {
                    console.error('Error:', error);
                    updateStatus('Failed to connect to server', 'red');
                    document.getElementById('databaseList').innerHTML = `
                        <div class="col-span-3 p-6 text-center text-red-600">
                            <p class="font-medium">Failed to connect to the server</p>
                            <p class="text-sm mt-2">${error.message || 'Please make sure the server is running and try again.'}</p>
                            <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                                Retry
                            </button>
                        </div>
                    `;
                });
        });

        async function checkServerConnection() {
            try {
                const response = await fetch('/api/test-db');
                const data = await response.json();
                if (data.success) {
                    updateStatus('Connected to server', 'green');
                    return true;
                } else {
                    throw new Error(data.message || 'Connection failed');
                }
            } catch (error) {
                throw new Error('Could not connect to the server. Make sure the backend is running.');
            }
        }

        function updateStatus(text, color) {
            const statusElement = document.getElementById('statusText');
            const statusDot = document.getElementById('connectionStatus');
            
            statusElement.textContent = text;
            
            // Remove all color classes
            ['bg-green-500', 'bg-yellow-500', 'bg-red-500'].forEach(cls => {
                statusDot.classList.remove(cls);
            });
            
            // Add the current color class
            if (color === 'green') statusDot.classList.add('bg-green-500');
            else if (color === 'red') statusDot.classList.add('bg-red-500');
            else statusDot.classList.add('bg-yellow-500');
        }

        async function loadDatabases() {
            updateStatus('Loading databases...', 'yellow');
            try {
                const response = await fetch('/api/databases');
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(`Found ${data.databases.length} databases`, 'green');
                    const dbList = document.getElementById('databaseList');
                    
                    if (data.databases.length === 0) {
                        dbList.innerHTML = `
                            <div class="col-span-3 p-6 text-center text-gray-500">
                                <p>No databases found</p>
                            </div>
                        `;
                        return;
                    }
                    
                    dbList.innerHTML = data.databases.map(db => `
                        <div class="database-card bg-blue-50 p-6 rounded-lg border border-blue-200 hover:border-blue-300 cursor-pointer transition-all"
                             onclick="loadDatabase('${db.name}')">
                            <div class="flex items-center">
                                <div class="p-2 bg-blue-100 rounded-lg mr-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4" />
                                    </svg>
                                </div>
                                <div class="text-left">
                                    <h3 class="font-medium text-blue-800">${db.name}</h3>
                                    <p class="text-sm text-gray-500">Click to view tables</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    throw new Error(data.message || 'Failed to load databases');
                }
            } catch (error) {
                console.error('Error loading databases:', error);
                updateStatus('Error loading databases', 'red');
                
                const dbList = document.getElementById('databaseList');
                dbList.innerHTML = `
                    <div class="col-span-3 p-6 text-center text-red-600">
                        <p class="font-medium">Error loading databases</p>
                        <p class="text-sm mt-2">${error.message || 'Please try again later.'}</p>
                        <button onclick="loadDatabases()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        async function loadDatabase(dbName) {
            currentDb = dbName;
            updateStatus(`Loading database: ${dbName}`, 'yellow');
            
            // Show loading state
            document.getElementById('databaseList').classList.add('hidden');
            document.getElementById('tableViewer').classList.remove('hidden');
            document.getElementById('currentDatabase').textContent = `Database: ${dbName}`;
            document.getElementById('tableButtons').innerHTML = `
                <div class="animate-pulse flex space-x-4 w-full">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                    </div>
                </div>
            `;
            document.getElementById('tableData').innerHTML = `
                <div class="text-center py-8">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2 text-gray-600">Loading tables...</p>
                </div>
            `;
            
            try {
                // Load tables
                const tablesResponse = await fetch(`/api/db/${dbName}/tables`);
                const tablesData = await tablesResponse.json();
                
                if (tablesData.success) {
                    updateStatus(`Loaded ${tablesData.tables.length} tables from ${dbName}`, 'green');
                    document.getElementById('tableCount').textContent = `${tablesData.tables.length} tables`;
                    
                    const tableButtons = document.getElementById('tableButtons');
                    if (tablesData.tables.length === 0) {
                        tableButtons.innerHTML = `
                            <div class="text-gray-500 italic">No tables found in this database</div>
                        `;
                        document.getElementById('tableData').innerHTML = '';
                        return;
                    }
                    
                    tableButtons.innerHTML = tablesData.tables
                        .filter(table => table[`Tables_in_${dbName}`])
                        .map((table, index) => {
                            const tableName = table[`Tables_in_${dbName}`];
                            return `
                                <button onclick="loadTable('${dbName}', '${tableName}')"
                                        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors">
                                    ${tableName}
                                </button>
                            `;
                        }).join('');
                    
                    // Load the first table by default
                    if (tablesData.tables[0] && tablesData.tables[0][`Tables_in_${dbName}`]) {
                        loadTable(dbName, tablesData.tables[0][`Tables_in_${dbName}`]);
                    }
                } else {
                    throw new Error(tablesData.message || 'Failed to load tables');
                }
            } catch (error) {
                console.error(`Error loading database ${dbName}:`, error);
                updateStatus(`Error loading database: ${dbName}`, 'red');
                
                document.getElementById('tableButtons').innerHTML = `
                    <div class="text-red-600">
                        <p>Error loading tables: ${error.message || 'Unknown error'}</p>
                        <button onclick="loadDatabase('${dbName}')" class="mt-2 px-3 py-1 text-sm bg-red-100 text-red-700 rounded hover:bg-red-200">
                            Retry
                        </button>
                    </div>
                `;
                
                document.getElementById('tableData').innerHTML = '';
            }
        }

        async function loadTable(dbName, tableName) {
            updateStatus(`Loading data from ${tableName}...`, 'yellow');
            
            // Update active table button
            document.querySelectorAll('#tableButtons button').forEach(btn => {
                if (btn.textContent.trim() === tableName) {
                    btn.classList.remove('bg-gray-100', 'text-gray-700');
                    btn.classList.add('bg-blue-100', 'text-blue-700');
                } else {
                    btn.classList.remove('bg-blue-100', 'text-blue-700');
                    btn.classList.add('bg-gray-100', 'text-gray-700');
                }
            });
            
            // Show loading state
            document.getElementById('tableData').innerHTML = `
                <div class="text-center py-12">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2 text-gray-600">Loading data from ${tableName}...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/db/${dbName}/table/${tableName}?limit=50`);
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(`Loaded ${data.data.length} rows from ${tableName}`, 'green');
                    
                    if (data.data.length > 0) {
                        const columns = Object.keys(data.data[0]);
                        const tableHtml = `
                            <div class="mb-4">
                                <h3 class="text-lg font-medium text-gray-800 mb-2">Table: ${tableName}</h3>
                                <p class="text-sm text-gray-600">
                                    Showing ${data.data.length} of ${data.pagination.total} records
                                    ${data.pagination.total > 50 ? '(limited to 50)' : ''}
                                </p>
                            </div>
                            <div class="overflow-x-auto border rounded-lg">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            ${columns.map(col => `
                                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                    ${col}
                                                </th>
                                            `).join('')}
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y divide-gray-200">
                                        ${data.data.map((row, rowIndex) => `
                                            <tr class="${rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-gray-100">
                                                ${columns.map(col => `
                                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 max-w-xs overflow-hidden overflow-ellipsis">
                                                        ${row[col] !== null ? row[col].toString().substring(0, 100) + (row[col].toString().length > 100 ? '...' : '') : 'NULL'}
                                                    </td>
                                                `).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                        document.getElementById('tableData').innerHTML = tableHtml;
                    } else {
                        document.getElementById('tableData').innerHTML = `
                            <div class="text-center py-12 text-gray-500">
                                <p>No data found in table: ${tableName}</p>
                            </div>
                        `;
                    }
                } else {
                    throw new Error(data.message || 'Failed to load table data');
                }
            } catch (error) {
                console.error(`Error loading table ${tableName}:`, error);
                updateStatus(`Error loading table: ${tableName}`, 'red');
                
                document.getElementById('tableData').innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-400 p-4">
                        <div class="flex">
                            <div class="flex-shrink-0">
                                <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <div class="ml-3">
                                <p class="text-sm text-red-700">
                                    Error loading table data: ${error.message || 'Unknown error'}
                                </p>
                                <div class="mt-2">
                                    <button onclick="loadTable('${dbName}', '${tableName}')" class="text-sm text-red-500 hover:text-red-700">
                                        Try again
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function backToDatabases() {
            document.getElementById('databaseList').classList.remove('hidden');
            document.getElementById('tableViewer').classList.add('hidden');
            document.getElementById('tableData').innerHTML = '';
            updateStatus('Connected to server', 'green');
        }
    </script>
</body>
</html>
